# BagiPangan Nginx template.
# Copy to /etc/nginx/sites-available/bagipangan, replace domains, then symlink
# to /etc/nginx/sites-enabled/bagipangan.

server {
    listen 80;
    server_name bagipangan.example.com www.bagipangan.example.com;

    access_log /var/log/nginx/bagipangan-frontend.access.log;
    error_log /var/log/nginx/bagipangan-frontend.error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name api.bagipangan.example.com;

    root /var/www/bagipangan/current/be-laravel/public;
    index index.php index.html;

    access_log /var/log/nginx/bagipangan-backend.access.log;
    error_log /var/log/nginx/bagipangan-backend.error.log;

    client_max_body_size 20m;

    location /storage/ {
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
