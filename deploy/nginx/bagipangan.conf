# BagiPangan Nginx template for one public domain.
# Public /api/* is handled by Next.js API routes. Laravel runs internally on
# 127.0.0.1:8000 and is reached by Next.js through BAGIPANGAN_BACKEND_URL.

server {
    listen 80;
    server_name bagipangan.eastasia.cloudapp.azure.com;

    client_max_body_size 20m;

    location /storage/ {
        alias /var/www/bagipangan/current/be-laravel/public/storage/;
        try_files $uri $uri/ =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
