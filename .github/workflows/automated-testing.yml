name: Automated Testing

on:
  push:
    branches:
      - main
      - "SCRUM-*"
      - "codex/**"
  pull_request:

jobs:
  test:
    name: TC Traceability, Backend, and Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run TC traceability tests
        run: npm run test:tc

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3
          coverage: none

      - name: Install backend dependencies
        working-directory: be-laravel
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run backend tests
        working-directory: be-laravel
        run: php artisan test

      - name: Install frontend dependencies
        working-directory: fe-nextjs
        run: npm ci

      - name: Run frontend checks
        working-directory: fe-nextjs
        env:
          BAGIPANGAN_BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
        run: npm run lint && npm run build
